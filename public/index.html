<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MessageAnywhere</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #0f172a;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .device-btn {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .device-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message {
      padding: 10px 12px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .message:hover { border-color: #334155; }
    .message:active { background: #1e293b; }
    .message-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 3px;
    }
    .message-text {
      font-size: 14px;
      color: #e2e8f0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message-hint {
      font-size: 10px;
      color: #475569;
      margin-top: 4px;
    }
    .message.copied { border-color: #3b82f6; }
    .message.copied .message-hint { color: #22c55e; }
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }
    .input-bar input:focus { border-color: #3b82f6; }
    .input-bar button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-bar button:hover { background: #2563eb; }
    .input-bar button:active { background: #1d4ed8; }
    .error-bar {
      padding: 8px 16px;
      background: #7f1d1d;
      color: #fca5a5;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .error-bar.visible { display: block; }
    .empty-state {
      text-align: center;
      color: #475569;
      padding: 40px 20px;
      font-size: 14px;
    }
    .device-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .device-modal.hidden { display: none; }
    .device-modal-box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 320px;
    }
    .device-modal-box h3 { font-size: 15px; margin-bottom: 12px; }
    .device-modal-box input {
      width: 100%;
      padding: 8px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }
    .device-modal-box input:focus { border-color: #3b82f6; }
    .device-modal-box .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .device-modal-box button {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }
    .btn-cancel { background: #334155; color: #e2e8f0; }
    .btn-save { background: #3b82f6; color: #fff; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>MessageAnywhere</h1>
      <button class="device-btn" id="deviceBtn" title="Change device name">Device</button>
    </div>
    <div class="error-bar" id="errorBar"></div>
    <div class="message-list" id="messageList">
      <div class="empty-state">No messages yet. Type something below to get started.</div>
    </div>
    <div class="input-bar">
      <input type="text" id="messageInput" placeholder="Type or paste a message..." maxlength="10000" autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <div class="device-modal hidden" id="deviceModal">
    <div class="device-modal-box">
      <h3>Device Name</h3>
      <input type="text" id="deviceNameInput" placeholder="e.g. My iPhone" maxlength="50" autocomplete="off">
      <div class="actions">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalSave">Save</button>
      </div>
    </div>
  </div>
  <script>
    // JS logic added in Task 8
  </script>
</body>
</html>
