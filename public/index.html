<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MessageAnywhere</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #000;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      flex-shrink: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .device-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #0a84ff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .device-btn:active { background: rgba(255,255,255,0.15); }
    .search-bar {
      padding: 8px 16px;
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-bar input {
      flex: 1;
      padding: 8px 12px;
      background: #1c1c1e;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .search-bar input::placeholder { color: #636366; }
    .search-clear {
      background: none;
      border: none;
      color: #0a84ff;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 8px;
    }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: #ff453a;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
    }
    .message-inner {
      padding: 12px 14px;
      background: #1c1c1e;
      cursor: pointer;
      transition: transform 0.2s ease;
      position: relative;
    }
    .message-inner.swiping { transition: none; }
    .message:active .message-inner { background: #2c2c2e; }
    .message-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #8e8e93;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .message-text {
      font-size: 16px;
      color: #fff;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .message-preview {
      max-height: 200px;
      overflow: hidden;
      position: relative;
    }
    .message-preview::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, #1c1c1e);
    }
    .expand-btn {
      display: block;
      background: none;
      border: none;
      color: #0a84ff;
      font-size: 13px;
      padding: 4px 0 0;
      cursor: pointer;
      font-family: inherit;
    }
    .message-hint {
      font-size: 11px;
      color: #8e8e93;
      margin-top: 4px;
    }
    .message.copied .message-hint { color: #30d158; }
    .edit-textarea {
      width: 100%;
      padding: 8px 10px;
      background: #2c2c2e;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      line-height: 1.4;
    }
    .edit-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .edit-actions button {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      font-weight: 500;
      font-family: inherit;
    }
    .btn-edit-save { background: #0a84ff; color: #fff; }
    .btn-edit-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      flex-shrink: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }
    .input-bar input {
      flex: 1;
      padding: 10px 16px;
      background: #1c1c1e;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }
    .input-bar input::placeholder { color: #636366; }
    .input-bar input:focus { background: #2c2c2e; }
    .input-bar button {
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .input-bar button:active { background: #0066cc; }
    .input-bar button:disabled { opacity: 0.4; }
    .error-bar {
      padding: 8px 16px;
      background: rgba(255,69,58,0.15);
      color: #ff453a;
      font-size: 13px;
      text-align: center;
      display: none;
      flex-shrink: 0;
    }
    .error-bar.visible { display: block; }
    .empty-state {
      text-align: center;
      color: #636366;
      padding: 60px 20px;
      font-size: 15px;
      line-height: 1.4;
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .device-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .device-modal.hidden { display: none; }
    .device-modal-box {
      background: #1c1c1e;
      padding: 24px;
      border-radius: 20px;
      width: 90%;
      max-width: 340px;
    }
    .device-modal-box h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; text-align: center; }
    .device-modal-box input {
      width: 100%;
      padding: 10px 14px;
      background: #2c2c2e;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      font-family: inherit;
    }
    .device-modal-box .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .device-modal-box button {
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      font-weight: 500;
      font-family: inherit;
    }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-save { background: #0a84ff; color: #fff; }

    .device-btn:focus-visible,
    .input-bar button:focus-visible,
    .btn-cancel:focus-visible,
    .btn-save:focus-visible,
    .search-clear:focus-visible,
    .expand-btn:focus-visible {
      outline: 2px solid #0a84ff;
      outline-offset: 2px;
    }
    .input-bar input:focus-visible,
    .search-bar input:focus-visible { outline: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Messages</h1>
      <button class="device-btn" id="deviceBtn" type="button">Device</button>
    </div>
    <div class="error-bar" id="errorBar"></div>
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="Search messages..." autocomplete="off">
      <button class="search-clear hidden" id="searchClear" type="button">Clear</button>
    </div>
    <div class="message-list" id="messageList">
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        No messages yet<br><span style="font-size:13px">Type something below to get started</span>
      </div>
    </div>
    <div class="input-bar">
      <input type="text" id="messageInput" placeholder="Message..." maxlength="10000" autocomplete="off">
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>
  <div class="device-modal hidden" id="deviceModal" role="dialog" aria-modal="true" aria-labelledby="deviceModalTitle">
    <div class="device-modal-box">
      <h3 id="deviceModalTitle">Device Name</h3>
      <input type="text" id="deviceNameInput" placeholder="e.g. My iPhone" maxlength="50" autocomplete="off">
      <div class="actions">
        <button class="btn-cancel" id="modalCancel" type="button">Cancel</button>
        <button class="btn-save" id="modalSave" type="button">Save</button>
      </div>
    </div>
  </div>
  <script>
    const API = '/api/messages';
    const POLL_INTERVAL = 3000;
    const DEVICE_KEY = 'device_name';
    const PREVIEW_LENGTH = 280;

    // Device name
    let deviceName = localStorage.getItem(DEVICE_KEY) || '';

    function getDeviceName() {
      if (!deviceName) {
        const ua = navigator.userAgent;
        if (/iPhone|iPad|iPod/.test(ua)) return 'iPhone';
        if (/Android/.test(ua)) return /Tablet|Tab/.test(ua) ? 'Android Tablet' : 'Android Phone';
        if (/Mac/.test(ua) && !/iPhone|iPad/.test(ua)) return 'Mac';
        if (/Windows/.test(ua)) return 'Windows PC';
        return 'Unknown Device';
      }
      return deviceName;
    }

    function updateDeviceBtn() {
      document.getElementById('deviceBtn').textContent = getDeviceName();
    }
    updateDeviceBtn();

    // Device name modal
    const deviceModal = document.getElementById('deviceModal');
    const deviceNameInput = document.getElementById('deviceNameInput');

    document.getElementById('deviceBtn').addEventListener('click', () => {
      deviceNameInput.value = getDeviceName();
      deviceModal.classList.remove('hidden');
      deviceNameInput.focus();
      deviceNameInput.select();
    });

    document.getElementById('modalCancel').addEventListener('click', () => {
      deviceModal.classList.add('hidden');
    });

    function saveDeviceName() {
      const name = deviceNameInput.value.trim();
      if (name) {
        deviceName = name;
        localStorage.setItem(DEVICE_KEY, name);
        updateDeviceBtn();
      }
      deviceModal.classList.add('hidden');
    }

    document.getElementById('modalSave').addEventListener('click', saveDeviceName);
    deviceNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveDeviceName();
      if (e.key === 'Escape') deviceModal.classList.add('hidden');
    });

    // Messages
    let lastId = 0;
    const messageList = document.getElementById('messageList');

    function relativeTime(iso) {
      const now = Date.now();
      const then = new Date(iso).getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
      return Math.floor(diff / 86400) + ' days ago';
    }

    function buildMessageHTML(msg, truncated) {
      const text = escapeHtml(msg.text);
      const preview = truncated && text.length > PREVIEW_LENGTH
        ? text.slice(0, PREVIEW_LENGTH) + '...'
        : text;
      const isLong = text.length > PREVIEW_LENGTH;
      return `
        <div class="message-meta">
          <span>${escapeHtml(msg.device_name)}</span>
          <span>${relativeTime(msg.created_at)}</span>
        </div>
        <div class="message-text${truncated && isLong ? ' message-preview' : ''}">${preview}</div>
        ${truncated && isLong ? '<button class="expand-btn" type="button">Show more</button>' : ''}
        ${!truncated && isLong ? '<button class="expand-btn" type="button">Show less</button>' : ''}
        <div class="message-hint"></div>
      `;
    }

    function createMessageEl(msg, truncated) {
      const div = document.createElement('div');
      div.className = 'message';
      div.dataset.id = msg.id;
      div._text = msg.text;
      div._truncated = truncated;
      div.innerHTML = `<div class="message-inner">${buildMessageHTML(msg, truncated)}</div>`;
      div.addEventListener('click', () => {
        if (div._editing) { div._editing = false; return; }
        copyMessage(div, div._text);
      });
      if (truncated && msg.text.length > PREVIEW_LENGTH) {
        div.querySelector('.expand-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          div._truncated = false;
          div.querySelector('.message-inner').innerHTML = buildMessageHTML(msg, false);
          div.querySelector('.expand-btn').addEventListener('click', (e2) => {
            e2.stopPropagation();
            div._truncated = true;
            div.querySelector('.message-inner').innerHTML = buildMessageHTML(msg, true);
            applySearchFilter();
          });
          applySearchFilter();
        });
      }
      return div;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showCopied(el) {
      el.classList.add('copied');
      el.querySelector('.message-hint').textContent = '✓ Copied';
      setTimeout(() => {
        el.classList.remove('copied');
        el.querySelector('.message-hint').textContent = '';
      }, 1000);
    }

    function copyMessage(el, text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showCopied(el);
        }).catch(() => {
          fallbackCopy(el, text);
        });
      } else {
        fallbackCopy(el, text);
      }
    }

    function fallbackCopy(el, text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) showCopied(el);
      } catch (e) {
        // Clipboard unavailable
      }
    }

    function clearEmptyState() {
      const es = messageList.querySelector('.empty-state');
      if (es) es.remove();
    }

    // Search
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    function applySearchFilter() {
      const query = searchInput.value.trim().toLowerCase();
      const msgs = messageList.querySelectorAll('.message');
      let visible = 0;
      msgs.forEach(m => {
        if (!query || m._text.toLowerCase().includes(query)) {
          m.style.display = '';
          visible++;
        } else {
          m.style.display = 'none';
        }
      });
      if (query) {
        searchClear.classList.remove('hidden');
        const existingNoResults = messageList.querySelector('.search-empty');
        if (visible === 0 && msgs.length > 0) {
          if (!existingNoResults) {
            const div = document.createElement('div');
            div.className = 'empty-state search-empty';
            div.textContent = 'No messages match "' + query + '"';
            messageList.appendChild(div);
          } else {
            existingNoResults.textContent = 'No messages match "' + query + '"';
          }
        } else if (existingNoResults) {
          existingNoResults.remove();
        }
      } else {
        searchClear.classList.add('hidden');
        const existingNoResults = messageList.querySelector('.search-empty');
        if (existingNoResults) existingNoResults.remove();
      }
    }

    searchInput.addEventListener('input', applySearchFilter);
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      applySearchFilter();
      searchInput.focus();
    });

    // Polling
    let polling = false;

    async function poll() {
      if (polling) return;
      polling = true;
      try {
        let url = API;
        if (lastId > 0) url += '?since=' + lastId;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        if (data.messages.length > 0) {
          clearEmptyState();
          for (const msg of data.messages) {
            messageList.appendChild(createMessageEl(msg, true));
            lastId = Math.max(lastId, msg.id);
          }
          messageList.scrollTop = messageList.scrollHeight;
          applySearchFilter();
        }
      } catch (e) {
        // Silent retry on next interval
      } finally {
        polling = false;
      }
    }

    // Initial load
    poll().then(() => {
      messageList.scrollTop = messageList.scrollHeight;
    });
    setInterval(poll, POLL_INTERVAL);

    // Send
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const errorBar = document.getElementById('errorBar');

    function showError(msg) {
      errorBar.textContent = msg;
      errorBar.classList.add('visible');
      setTimeout(() => errorBar.classList.remove('visible'), 4000);
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, device_name: getDeviceName() })
        });
        if (res.ok) {
          messageInput.value = '';
          poll();
        } else {
          const err = await res.json();
          showError(err.error || 'Failed to send');
        }
      } catch (e) {
        showError('Failed to send. Server may be offline.');
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function deleteMessage(el, id) {
      try {
        const res = await fetch(API + '/' + id, { method: 'DELETE' });
        if (res.ok || res.status === 404) {
          el.remove();
          const existingNoResults = messageList.querySelector('.search-empty');
          if (existingNoResults) existingNoResults.remove();
          if (messageList.children.length === 0) {
            messageList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div>No messages yet<br><span style="font-size:13px">Type something below to get started</span></div>';
          }
        }
      } catch (e) {
        // Silent
      }
    }

    // Swipe and long-press
    let swipeTarget = null;
    let swipeStartX = 0;
    let swipeStartY = 0;
    let swipeDeltaX = 0;
    let swiping = false;
    let longPressTimer = null;

    function enterEditMode(el) {
      const textEl = el.querySelector('.message-text');
      const original = el._text;
      textEl.innerHTML = `
        <textarea class="edit-textarea" rows="3" maxlength="10000">${escapeHtml(original)}</textarea>
        <div class="edit-actions">
          <button class="btn-edit-cancel" type="button">Cancel</button>
          <button class="btn-edit-save" type="button">Save</button>
        </div>
      `;
      const ta = textEl.querySelector('.edit-textarea');
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(el); }
        if (e.key === 'Escape') cancelEdit(el);
      });
      textEl.querySelector('.btn-edit-cancel').addEventListener('click', () => cancelEdit(el));
      textEl.querySelector('.btn-edit-save').addEventListener('click', () => saveEdit(el));
      el._editing = true;
    }

    function cancelEdit(el) {
      el.querySelector('.message-text').textContent = el._text;
      el._editing = false;
    }

    async function saveEdit(el) {
      const ta = el.querySelector('.edit-textarea');
      const text = ta ? ta.value.trim() : '';
      if (!text) return;
      try {
        const res = await fetch(API + '/' + el.dataset.id, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          el._text = text;
          el.querySelector('.message-text').textContent = text;
          el._editing = false;
        } else {
          const err = await res.json();
          showError(err.error || 'Failed to save');
        }
      } catch (e) {
        showError('Failed to save. Server may be offline.');
      }
    }

    messageList.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) { swipeTarget = null; return; }
      swipeTarget = e.target.closest('.message');
      if (!swipeTarget || swipeTarget._editing) return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
      swipeDeltaX = 0;
      swiping = false;
      longPressTimer = setTimeout(() => {
        if (!swiping) enterEditMode(swipeTarget);
        longPressTimer = null;
      }, 500);
    }, { passive: true });

    messageList.addEventListener('touchmove', (e) => {
      if (!swipeTarget) return;
      const dx = e.touches[0].clientX - swipeStartX;
      const dy = e.touches[0].clientY - swipeStartY;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 5) {
        swiping = true;
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      }
      if (!swiping) return;
      e.preventDefault();
      swipeDeltaX = Math.max(-120, Math.min(0, dx));
      const inner = swipeTarget.querySelector('.message-inner');
      if (inner) {
        inner.classList.add('swiping');
        inner.style.transform = `translateX(${swipeDeltaX}px)`;
      }
    }, { passive: false });

    messageList.addEventListener('contextmenu', (e) => {
      const msgEl = e.target.closest('.message');
      if (!msgEl || msgEl._editing) return;
      e.preventDefault();
      enterEditMode(msgEl);
    });

    messageList.addEventListener('dblclick', (e) => {
      const msgEl = e.target.closest('.message');
      if (!msgEl || msgEl._editing) return;
      msgEl._editing = true;
      const id = parseInt(msgEl.dataset.id, 10);
      if (id) deleteMessage(msgEl, id);
    });

    messageList.addEventListener('touchend', () => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      if (!swipeTarget) return;
      const inner = swipeTarget.querySelector('.message-inner');
      if (inner) {
        inner.classList.remove('swiping');
        inner.style.transition = 'transform 0.2s ease';
        if (swipeDeltaX < -80) {
          swipeTarget._editing = true;
          inner.style.transform = 'translateX(-120%)';
          const id = parseInt(swipeTarget.dataset.id, 10);
          if (id) deleteMessage(swipeTarget, id);
        } else {
          inner.style.transform = 'translateX(0)';
        }
      }
      swipeTarget = null;
    });
  </script>
</body>
</html>
