<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MessageAnywhere</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #e2e8f0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #0f172a;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .device-btn {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .device-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #ef4444;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
    }
    .message-inner {
      padding: 10px 12px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.2s ease;
      position: relative;
    }
    .message-inner.swiping { transition: none; }
    .message:hover .message-inner { border-color: #334155; }
    .message:active .message-inner { background: #162032; }
    .message-delete-label {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
    }
    .message-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 3px;
    }
    .message-text {
      font-size: 14px;
      color: #e2e8f0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message-hint {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .message.copied .message-inner { border-color: #3b82f6; }
    .message.copied .message-hint { color: #22c55e; }
    .input-bar {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }
    .input-bar input:focus { border-color: #3b82f6; }
    .input-bar button {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-bar button:hover { background: #2563eb; }
    .input-bar button:active { background: #1d4ed8; }
    .error-bar {
      padding: 8px 16px;
      background: #7f1d1d;
      color: #fca5a5;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .error-bar.visible { display: block; }
    .empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 40px 20px;
      font-size: 14px;
    }
    .device-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .device-modal.hidden { display: none; }
    .device-modal-box {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 320px;
    }
    .device-modal-box h3 { font-size: 15px; margin-bottom: 12px; }
    .device-modal-box input {
      width: 100%;
      padding: 8px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }
    .device-modal-box input:focus { border-color: #3b82f6; }
    .device-modal-box .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .device-modal-box button {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }
    .btn-cancel { background: #334155; color: #e2e8f0; }
    .btn-save { background: #3b82f6; color: #fff; }

    /* Focus styles */
    .device-btn:focus-visible,
    .input-bar button:focus-visible,
    .btn-cancel:focus-visible,
    .btn-save:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }
    .input-bar input:focus-visible { outline: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>MessageAnywhere</h1>
      <button class="device-btn" id="deviceBtn" type="button" title="Change device name">Device</button>
    </div>
    <div class="error-bar" id="errorBar"></div>
    <div class="message-list" id="messageList">
      <div class="empty-state">No messages yet. Type something below to get started.</div>
    </div>
    <div class="input-bar">
      <input type="text" id="messageInput" placeholder="Type or paste a message..." maxlength="10000" autocomplete="off">
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>
  <div class="device-modal hidden" id="deviceModal" role="dialog" aria-modal="true" aria-labelledby="deviceModalTitle">
    <div class="device-modal-box">
      <h3 id="deviceModalTitle">Device Name</h3>
      <input type="text" id="deviceNameInput" placeholder="e.g. My iPhone" maxlength="50" autocomplete="off">
      <div class="actions">
        <button class="btn-cancel" id="modalCancel" type="button">Cancel</button>
        <button class="btn-save" id="modalSave" type="button">Save</button>
      </div>
    </div>
  </div>
  <script>
    const API = '/api/messages';
    const POLL_INTERVAL = 3000;
    const DEVICE_KEY = 'device_name';

    // Device name
    let deviceName = localStorage.getItem(DEVICE_KEY) || '';

    function getDeviceName() {
      if (!deviceName) {
        const ua = navigator.userAgent;
        if (/iPhone|iPad|iPod/.test(ua)) return 'iPhone';
        if (/Android/.test(ua)) return /Tablet|Tab/.test(ua) ? 'Android Tablet' : 'Android Phone';
        if (/Mac/.test(ua) && !/iPhone|iPad/.test(ua)) return 'Mac';
        if (/Windows/.test(ua)) return 'Windows PC';
        return 'Unknown Device';
      }
      return deviceName;
    }

    function updateDeviceBtn() {
      document.getElementById('deviceBtn').textContent = getDeviceName();
    }
    updateDeviceBtn();

    // Device name modal
    const deviceModal = document.getElementById('deviceModal');
    const deviceNameInput = document.getElementById('deviceNameInput');

    document.getElementById('deviceBtn').addEventListener('click', () => {
      deviceNameInput.value = getDeviceName();
      deviceModal.classList.remove('hidden');
      deviceNameInput.focus();
      deviceNameInput.select();
    });

    document.getElementById('modalCancel').addEventListener('click', () => {
      deviceModal.classList.add('hidden');
    });

    function saveDeviceName() {
      const name = deviceNameInput.value.trim();
      if (name) {
        deviceName = name;
        localStorage.setItem(DEVICE_KEY, name);
        updateDeviceBtn();
      }
      deviceModal.classList.add('hidden');
    }

    document.getElementById('modalSave').addEventListener('click', saveDeviceName);
    deviceNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveDeviceName();
      if (e.key === 'Escape') deviceModal.classList.add('hidden');
    });

    // Messages
    let lastId = 0;
    const messageList = document.getElementById('messageList');

    function relativeTime(iso) {
      const now = Date.now();
      const then = new Date(iso).getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
      return Math.floor(diff / 86400) + ' days ago';
    }

    function createMessageEl(msg) {
      const div = document.createElement('div');
      div.className = 'message';
      div.dataset.id = msg.id;
      div.innerHTML = `
        <div class="message-inner">
          <div class="message-meta">
            <span>${escapeHtml(msg.device_name)}</span>
            <span>${relativeTime(msg.created_at)}</span>
          </div>
          <div class="message-text">${escapeHtml(msg.text)}</div>
          <div class="message-hint">← swipe to delete</div>
        </div>
        <div class="message-delete-label">Delete</div>
      `;
      div.addEventListener('click', () => copyMessage(div, msg.text));
      return div;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showCopied(el) {
      el.classList.add('copied');
      el.querySelector('.message-hint').textContent = '✓ copied!';
      setTimeout(() => {
        el.classList.remove('copied');
        el.querySelector('.message-hint').textContent = '← swipe to delete';
      }, 1000);
    }

    function copyMessage(el, text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showCopied(el);
        }).catch(() => {
          fallbackCopy(el, text);
        });
      } else {
        fallbackCopy(el, text);
      }
    }

    function fallbackCopy(el, text) {
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) showCopied(el);
      } catch (e) {
        // Clipboard unavailable
      }
    }

    // Remove empty state if present
    function clearEmptyState() {
      const es = messageList.querySelector('.empty-state');
      if (es) es.remove();
    }

    // Polling
    let polling = false;

    async function poll() {
      if (polling) return;
      polling = true;
      try {
        let url = API;
        if (lastId > 0) url += '?since=' + lastId;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        if (data.messages.length > 0) {
          clearEmptyState();
          for (const msg of data.messages) {
            messageList.appendChild(createMessageEl(msg));
            lastId = Math.max(lastId, msg.id);
          }
          messageList.scrollTop = messageList.scrollHeight;
        }
      } catch (e) {
        // Silent retry on next interval
      } finally {
        polling = false;
      }
    }

    // Initial load
    poll().then(() => {
      // Auto-scroll to bottom on first load
      messageList.scrollTop = messageList.scrollHeight;
    });
    setInterval(poll, POLL_INTERVAL);

    // Send
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const errorBar = document.getElementById('errorBar');

    function showError(msg) {
      errorBar.textContent = msg;
      errorBar.classList.add('visible');
      setTimeout(() => errorBar.classList.remove('visible'), 4000);
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, device_name: getDeviceName() })
        });
        if (res.ok) {
          messageInput.value = '';
          poll(); // Immediate poll to show the new message
        } else {
          const err = await res.json();
          showError(err.error || 'Failed to send');
        }
      } catch (e) {
        showError('Failed to send. Server may be offline.');
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function deleteMessage(el, id) {
      try {
        const res = await fetch(API + '/' + id, { method: 'DELETE' });
        if (res.ok || res.status === 404) {
          el.remove();
          if (messageList.children.length === 0) {
            messageList.innerHTML = '<div class="empty-state">No messages yet. Type something below to get started.</div>';
          }
        }
      } catch (e) {
        // Silent
      }
    }

    // Swipe to delete
    let swipeTarget = null;
    let swipeStartX = 0;
    let swipeStartY = 0;
    let swipeDeltaX = 0;
    let swiping = false;

    messageList.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) { swipeTarget = null; return; }
      swipeTarget = e.target.closest('.message');
      if (!swipeTarget) return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
      swipeDeltaX = 0;
      swiping = false;
    }, { passive: true });

    messageList.addEventListener('touchmove', (e) => {
      if (!swipeTarget) return;
      const dx = e.touches[0].clientX - swipeStartX;
      const dy = e.touches[0].clientY - swipeStartY;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 5) {
        swiping = true;
      }
      if (!swiping) return;
      e.preventDefault();
      swipeDeltaX = Math.max(-120, Math.min(0, dx));
      const inner = swipeTarget.querySelector('.message-inner');
      if (inner) {
        inner.classList.add('swiping');
        inner.style.transform = `translateX(${swipeDeltaX}px)`;
      }
    }, { passive: false });

    messageList.addEventListener('touchend', () => {
      if (!swipeTarget) return;
      const inner = swipeTarget.querySelector('.message-inner');
      if (inner) {
        inner.classList.remove('swiping');
        inner.style.transition = 'transform 0.2s ease';
        if (swipeDeltaX < -80) {
          inner.style.transform = 'translateX(-120%)';
          const id = parseInt(swipeTarget.dataset.id, 10);
          if (id) deleteMessage(swipeTarget, id);
        } else {
          inner.style.transform = 'translateX(0)';
        }
      }
      swipeTarget = null;
    });
  </script>
</body>
</html>
